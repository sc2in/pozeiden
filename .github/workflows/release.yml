name: Release

on:
  push:
    tags:
      - "v?[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to re-publish"
        type: string
        required: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          - os: ubuntu-24.04-arm
            system: aarch64-linux
          # macOS (x86_64/aarch64-darwin) is declared in flake.nix supportedSystems
          # but not built/tested here; add macos runners before advertising it.

    runs-on: ${{ matrix.os }}
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          # Full history + tags so the release-tag CHANGELOG guard can diff
          # against the previous tag.
          fetch-depth: 0

      # Authoritative backstop for the local pre-push hook (.githooks/pre-push):
      # a release tag must include a CHANGELOG.md change since the previous tag.
      # Cannot be bypassed with `git push --no-verify`.
      - name: Require CHANGELOG update for release tag
        if: ${{ github.ref_type == 'tag' }}
        run: |
          tag="${{ github.ref_name }}"
          prev="$(git describe --tags --abbrev=0 "${tag}^" 2>/dev/null || true)"
          if [ -z "$prev" ]; then
            echo "No previous tag; skipping CHANGELOG check."
            exit 0
          fi
          if git diff --quiet "$prev" "$tag" -- CHANGELOG.md; then
            echo "::error::CHANGELOG.md has no changes between $prev and $tag. Update the changelog (e.g. 'nix run .#bump') before releasing."
            exit 1
          fi
          echo "CHANGELOG.md updated since $prev ✓"

      - name: Install Nix
        uses: DeterminateSystems/determinate-nix-action@main

      - name: Configure permissions
        # Enable unprivileged user namespaces, required by bubblewrap:
        # zig2nix's zig-hook runs the compiler inside bwrap, so from-source
        # builds of zig2nix tooling fail without this on Ubuntu 24.04 runners
        # ("bwrap: setting up uid map: Permission denied") — which is exactly
        # how the v0.2.0 release run died when the cache was throttled.
        run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true

      - name: Setup Nix cache
        uses: DeterminateSystems/flakehub-cache-action@main
        with:
          use-gha-cache: "enabled"
          flakehub-flake-name: "sc2in/Pozeiden"

      - name: Build
        run: nix build

      - name: Package
        run: |
          ARCHIVE="pozeiden-${{ github.ref_name }}-${{ matrix.system }}.tar.gz"
          tar czf "$ARCHIVE" --dereference \
            -C result \
            bin \
            lib \
            include
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.system }}
          path: ${{ env.ARCHIVE }}
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd dist
          sha256sum *.tar.gz > checksums.txt

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          generate_release_notes: true

