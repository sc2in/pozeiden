<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pozeiden Playground</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #1e1e2e;
      --surface:     #24273a;
      --surface2:    #2d3045;
      --border:      #363a52;
      --text:        #cad3f5;
      --text-dim:    #6e738d;
      --accent:      #8aadf4;
      --green:       #a6da95;
      --red:         #ed8796;
      --yellow:      #eed49f;
      --preview-bg:  #f8f9fa;
      --radius:      7px;
      --font-mono:   'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
    }

    html, body { height: 100%; }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      height: 46px;
      flex-shrink: 0;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }

    .logo {
      font-size: 1rem;
      font-weight: 800;
      color: var(--accent);
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .logo span { color: var(--text-dim); font-weight: 400; font-size: 0.8rem; margin-left: 6px; }

    #example-select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 10px;
      font-size: 0.83rem;
      cursor: pointer;
      height: 30px;
    }
    #example-select:focus { outline: 2px solid var(--accent); outline-offset: 2px; }

    .header-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

    .chip {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 26px;
      padding: 0 8px;
      border-radius: 13px;
      font-size: 0.75rem;
      white-space: nowrap;
      background: var(--surface2);
      border: 1px solid var(--border);
    }
    .chip-label { color: var(--text-dim); font-weight: 600; }
    .chip-val   { color: var(--green); font-variant-numeric: tabular-nums; }
    .chip-val.loading { color: var(--yellow); }
    .chip-val.error   { color: var(--red); }

    .hdr-btn {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 4px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      height: 30px;
      white-space: nowrap;
      transition: background 0.15s;
    }
    .hdr-btn:hover { background: var(--border); }

    .panel-label {
      height: 28px;
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 8px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .zoom-controls { margin-left: auto; display: flex; align-items: center; gap: 2px; }

    .zoom-btn {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-dim);
      border-radius: 4px;
      width: 22px;
      height: 20px;
      font-size: 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, color 0.1s;
    }
    .zoom-btn:hover { background: var(--surface2); color: var(--text); }
    .zoom-btn.wide  { width: auto; padding: 0 5px; }

    .zoom-level {
      font-size: 0.66rem;
      color: var(--text-dim);
      min-width: 32px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .panels {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    .editor-pane {
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    #editor {
      flex: 1;
      resize: none;
      background: var(--bg);
      color: var(--text);
      border: none;
      padding: 14px 16px;
      font-family: var(--font-mono);
      font-size: 0.875rem;
      line-height: 1.65;
      outline: none;
      tab-size: 4;
      overflow: auto;
    }

    .preview-pane {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #viewport {
      flex: 1;
      overflow: hidden;
      background: var(--preview-bg);
      position: relative;
      cursor: grab;
    }
    #viewport:active { cursor: grabbing; }

    #canvas {
      position: absolute;
      top: 0; left: 0;
      transform-origin: 0 0;
    }
    #canvas svg { display: block; border-radius: 4px; }

    #placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #adb5bd;
      font-size: 0.875rem;
      pointer-events: none;
    }

    #wasm-error {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(30,30,46,0.92);
      color: var(--red);
      font-family: var(--font-mono);
      font-size: 0.83rem;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
      z-index: 10;
    }

    @media (max-width: 680px) {
      .panels { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
      .editor-pane { border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Pozeiden <span>mermaid → svg</span></div>
  <select id="example-select" title="Load an example diagram">
    <option value="">— examples —</option>
  </select>
  <div class="header-right">
    <div class="chip">
      <span class="chip-label">⚡</span>
      <span class="chip-val loading" id="render-time">–</span>
    </div>
    <button id="copy-btn" class="hdr-btn">Copy SVG</button>
  </div>
</header>

<div class="panels">
  <div class="editor-pane">
    <div class="panel-label">Mermaid Source</div>
    <textarea id="editor" spellcheck="false" autocorrect="off" autocomplete="off" autocapitalize="off"></textarea>
  </div>

  <div class="preview-pane">
    <div class="panel-label">
      SVG Preview
      <div class="zoom-controls">
        <button class="zoom-btn" id="btn-out">−</button>
        <span class="zoom-level" id="zoom-label">100%</span>
        <button class="zoom-btn" id="btn-in">+</button>
        <button class="zoom-btn wide" id="btn-fit">⊡</button>
      </div>
    </div>
    <div id="viewport">
      <div id="canvas"></div>
      <div id="placeholder">Waiting…</div>
      <div id="wasm-error"></div>
    </div>
  </div>
</div>

<script>
// ── Examples ──────────────────────────────────────────────────────────────────
const EXAMPLES = [
  'flowchart','sequence','class','state','er','gantt','gitgraph','pie',
  'mindmap','timeline','xychart','quadrant','sankey','c4','block','requirement','kanban',
];
const cache = {};
async function fetchExample(name) {
  if (cache[name]) return cache[name];
  const r = await fetch(`examples/${name}.mmd`);
  if (!r.ok) throw new Error(r.status);
  return (cache[name] = await r.text());
}

// ── WASM ──────────────────────────────────────────────────────────────────────
let wasm = null, lastSvg = '';
const buf = () => wasm ? wasm.memory.buffer : new ArrayBuffer(0);

const wasiShim = { wasi_snapshot_preview1: {
  fd_write(fd, iov, n, nw) {
    const v = new DataView(buf()); let w = 0;
    for (let i = 0; i < n; i++) {
      const b = v.getUint32(iov + i*8, true), l = v.getUint32(iov + i*8+4, true);
      if (fd === 2) console.warn('[wasm]', new TextDecoder().decode(new Uint8Array(buf(), b, l)));
      w += l;
    }
    v.setUint32(nw, w, true); return 0;
  },
  fd_read(){ return 8; }, fd_filestat_get(){ return 8; },
  fd_seek(){ return 8; }, fd_pwrite(){ return 8; },
}};

// ── Timing ────────────────────────────────────────────────────────────────────
function fmt(ms) {
  if (ms < 1)  return Math.round(ms * 1000) + ' µs';
  return parseFloat(ms.toFixed(2)) + ' ms';
}

// ── Zoom / pan ────────────────────────────────────────────────────────────────
const viewport = document.getElementById('viewport');
const canvas   = document.getElementById('canvas');
const zoomLbl  = document.getElementById('zoom-label');
let sc = 1, tx = 0, ty = 0, svgW = 0, svgH = 0;

function applyXform() {
  canvas.style.transform = `translate(${tx}px,${ty}px) scale(${sc})`;
  zoomLbl.textContent = Math.round(sc * 100) + '%';
}

function fit() {
  if (!svgW || !svgH) return;
  const vr = viewport.getBoundingClientRect();
  // Guard: if the viewport isn't laid out yet, defer to next frame
  if (vr.width < 10 || vr.height < 10) { requestAnimationFrame(fit); return; }
  const pad = 24;
  sc = Math.min((vr.width - pad * 2) / svgW, (vr.height - pad * 2) / svgH, 1);
  tx = (vr.width  - svgW * sc) / 2;
  ty = (vr.height - svgH * sc) / 2;
  applyXform();
}

function zoomTo(factor, cx, cy) {
  const ns = Math.min(Math.max(sc * factor, 0.05), 16);
  const r  = ns / sc;
  tx = cx - (cx - tx) * r;
  ty = cy - (cy - ty) * r;
  sc = ns;
  applyXform();
}

document.getElementById('btn-in').addEventListener('click', () => {
  const r = viewport.getBoundingClientRect();
  zoomTo(1.25, r.width / 2, r.height / 2);
});
document.getElementById('btn-out').addEventListener('click', () => {
  const r = viewport.getBoundingClientRect();
  zoomTo(1 / 1.25, r.width / 2, r.height / 2);
});
document.getElementById('btn-fit').addEventListener('click', fit);

viewport.addEventListener('wheel', e => {
  e.preventDefault();
  const r = viewport.getBoundingClientRect();
  zoomTo(e.deltaY < 0 ? 1.12 : 1/1.12, e.clientX - r.left, e.clientY - r.top);
}, { passive: false });

{ // drag-to-pan
  let dn = false, sx = 0, sy = 0, stx = 0, sty = 0;
  viewport.addEventListener('mousedown', e => {
    if (e.button) return; dn = true;
    sx = e.clientX; sy = e.clientY; stx = tx; sty = ty; e.preventDefault();
  });
  window.addEventListener('mousemove', e => {
    if (!dn) return;
    tx = stx + e.clientX - sx; ty = sty + e.clientY - sy; applyXform();
  });
  window.addEventListener('mouseup', () => { dn = false; });
}

window.addEventListener('resize', fit);

// ── SVG dimensions (regex — no DOM parse, no ID-table side effects) ───────────
function svgSize(text) {
  const tag = text.match(/<svg[^>]+>/)?.[0] ?? '';
  const w = parseFloat(tag.match(/\bwidth="([^"]+)"/)?.[1] ?? '0');
  const h = parseFloat(tag.match(/\bheight="([^"]+)"/)?.[1] ?? '0');
  if (w > 0 && h > 0) return [w, h];
  // fall back to last two numbers in viewBox
  const vb = tag.match(/\bviewBox="[^"]*\s+([\d.]+)\s+([\d.]+)"/);
  if (vb) return [parseFloat(vb[1]), parseFloat(vb[2])];
  return [400, 300];
}

// ── Render ────────────────────────────────────────────────────────────────────
// Inline SVG with per-render ID mangling.
// Pozeiden emits fixed marker IDs (e.g. id="arrow") that go into the browser's
// global ID table when SVGs are injected inline.  Replacing innerHTML while a
// previous paint job still holds a url(#arrow) reference can cause a
// use-after-free inside Blink's SVG paint server, crashing the tab.
// Fix: prefix every id/url-ref with a short random tag so each render's IDs
// are unique and no stale reference can survive across renders.
const timeEl      = document.getElementById('render-time');
const placeholder  = document.getElementById('placeholder');

let renderId = 0; // monotonically increasing render nonce

function render(text) {
  if (!wasm) return;
  timeEl.className = 'chip-val loading';
  timeEl.textContent = '…';

  const t0 = performance.now();
  try {
    const enc = new TextEncoder().encode(text);
    new Uint8Array(buf()).set(enc, wasm.get_input_ptr());
    const len = wasm.render(enc.length);
    const elapsed = performance.now() - t0;

    if (!len) {
      timeEl.className = 'chip-val error';
      timeEl.textContent = 'empty';
      canvas.innerHTML = '';
      placeholder.style.display = 'flex';
      placeholder.textContent = 'Render returned empty output.';
      lastSvg = '';
      return;
    }

    lastSvg = new TextDecoder().decode(new Uint8Array(buf(), wasm.get_output_ptr(), len));
    timeEl.className = 'chip-val';
    timeEl.textContent = fmt(elapsed);
    placeholder.style.display = 'none';

    // Mangle all IDs so this render's markers never collide with a previous
    // render's IDs that may still be live in the browser's paint pipeline.
    const rid = 'r' + (++renderId);
    const safeSvg = lastSvg
      .replace(/\bid="([^"]+)"/g,   `id="$1-${rid}"`)
      .replace(/url\(#([^)]+)\)/g,  `url(#$1-${rid})`);

    canvas.innerHTML = safeSvg;

    const [w, h] = svgSize(lastSvg);
    svgW = w; svgH = h;
    canvas.style.width = w + 'px';
    canvas.style.height = h + 'px';
    fit();
  } catch (e) {
    timeEl.className = 'chip-val error';
    timeEl.textContent = 'error';
    console.error(e);
  }
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  try {
    const { instance } = await WebAssembly.instantiateStreaming(fetch('pozeiden.wasm'), wasiShim);
    wasm = instance.exports;
    timeEl.className = 'chip-val';
    timeEl.textContent = 'ready';

    const editor = document.getElementById('editor');
    document.getElementById('example-select').value = 'flowchart';
    try {
      const text = await fetchExample('flowchart');
      editor.value = text;
      render(text);
    } catch { render(editor.value); }
  } catch (e) {
    const el = document.getElementById('wasm-error');
    el.style.display = 'flex';
    el.textContent = 'Failed to load pozeiden.wasm\n\n' + e +
      '\n\nServe over HTTP (e.g. python3 -m http.server)';
    timeEl.className = 'chip-val error';
    timeEl.textContent = 'load failed';
  }
})();

// ── UI ────────────────────────────────────────────────────────────────────────
const editor = document.getElementById('editor');
let debounce = null;
editor.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => render(editor.value), 180);
});
editor.addEventListener('keydown', e => {
  if (e.key !== 'Tab') return;
  e.preventDefault();
  const s = editor.selectionStart, end = editor.selectionEnd;
  editor.value = editor.value.slice(0, s) + '    ' + editor.value.slice(end);
  editor.selectionStart = editor.selectionEnd = s + 4;
});

const sel = document.getElementById('example-select');
for (const n of EXAMPLES) {
  const o = document.createElement('option');
  o.value = n; o.textContent = n; sel.appendChild(o);
}
sel.addEventListener('change', async () => {
  const n = sel.value; if (!n) return;
  try { const t = await fetchExample(n); editor.value = t; render(t); }
  catch (e) { console.error(e); }
});

document.getElementById('copy-btn').addEventListener('click', async () => {
  if (!lastSvg) return;
  try {
    await navigator.clipboard.writeText(lastSvg);
    const b = document.getElementById('copy-btn');
    b.textContent = 'Copied!';
    setTimeout(() => { b.textContent = 'Copy SVG'; }, 1500);
  } catch {
    const t = document.createElement('textarea');
    t.value = lastSvg; document.body.appendChild(t); t.select();
    document.execCommand('copy'); document.body.removeChild(t);
  }
});
</script>
</body>
</html>
